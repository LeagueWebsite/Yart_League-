<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Yart League — Live Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1322; --ink-2:#141d31; --surface:#17223a; --surface-2:#1d2a45;
    --line:#2a3a5c; --text:#eaf0fb; --muted:#8a97b4;
    --amber:#e9a23b; --flame:#f2602f; --teal:#34c8b4;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    background:radial-gradient(900px 500px at 85% -10%, rgba(233,162,59,.10), transparent 60%), var(--ink);
    color:var(--text); font-family:'Inter',system-ui,sans-serif; line-height:1.4;
    -webkit-font-smoothing:antialiased; min-height:100vh; padding:0 14px 60px;
  }
  body::before,body::after{content:"";position:fixed;border-radius:50%;filter:blur(72px);z-index:-1;pointer-events:none;}
  body::before{width:360px;height:360px;background:radial-gradient(circle,rgba(242,96,47,.22),transparent 70%);top:-70px;left:-70px;animation:drift1 17s ease-in-out infinite;}
  body::after{width:440px;height:440px;background:radial-gradient(circle,rgba(52,200,180,.14),transparent 70%);bottom:-130px;right:-90px;animation:drift2 21s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0);}50%{transform:translate(46px,34px);}}
  @keyframes drift2{0%,100%{transform:translate(0,0);}50%{transform:translate(-44px,-30px);}}
  @media(prefers-reduced-motion:reduce){body::before,body::after{animation:none;}}
  .wrap{max-width:760px;margin:0 auto;position:relative;z-index:1;}
  .tabnum{font-variant-numeric:tabular-nums;}

  /* ---------- HOME ---------- */
  .home-hero{padding:44px 0 16px;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .eyebrow-row{display:flex;align-items:center;gap:13px;margin-bottom:14px;}
  .eyebrow-row .hr{height:1px;width:36px;background:linear-gradient(90deg,transparent,var(--amber));}
  .eyebrow-row .hr:last-child{background:linear-gradient(90deg,var(--amber),transparent);}
  .logo-wrap{position:relative;display:flex;justify-content:center;align-items:center;padding:8px 0 2px;animation:float 6s ease-in-out infinite;}
  .logo-wrap::before{content:"";position:absolute;width:66%;height:66%;border-radius:50%;
    background:radial-gradient(circle,rgba(242,96,47,.42),transparent 68%);filter:blur(26px);z-index:0;animation:glow 4.5s ease-in-out infinite;}
  .logo{position:relative;z-index:1;display:block;width:min(300px,76vw);height:auto;animation:logoin .7s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes glow{0%,100%{opacity:.5;transform:scale(.95);}50%{opacity:.95;transform:scale(1.05);}}
  @keyframes logoin{from{opacity:0;transform:translateY(16px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  @media(prefers-reduced-motion:reduce){.logo-wrap,.logo-wrap::before,.logo{animation:none;}}
  .ball{
    width:74px;height:74px;border-radius:50%;margin:0 auto 18px;
    background:radial-gradient(circle at 35% 30%, #f4b755, var(--flame));
    position:relative;box-shadow:0 14px 40px rgba(242,96,47,.35);
  }
  .ball::before,.ball::after{content:"";position:absolute;background:#5b1f08;}
  .ball::before{top:0;bottom:0;left:50%;width:2.5px;transform:translateX(-50%);}
  .ball::after{left:0;right:0;top:50%;height:2.5px;transform:translateY(-50%);}
  .ball i{position:absolute;inset:0;border-radius:50%;border:2.5px solid transparent;
    border-top-color:#5b1f08;border-bottom-color:#5b1f08;transform:scaleX(.45);}
  .eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--amber);}
  h1{font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(40px,11vw,68px);line-height:.9;letter-spacing:-.02em;text-transform:uppercase;margin-top:8px;}
  h1 span{color:var(--amber);}
  .tag{color:var(--muted);margin-top:12px;font-size:14px;}

  .start{
    display:flex;align-items:center;gap:7px;width:fit-content;margin:16px auto 0;background:var(--amber);color:#1a1304;
    border:none;font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;
    letter-spacing:.06em;text-transform:uppercase;padding:10px 20px;border-radius:11px;cursor:pointer;
    box-shadow:0 6px 18px rgba(233,162,59,.22);transition:transform .08s,filter .15s;
  }
  .start .lk{flex:0 0 auto;margin-top:-1px;}
  .start:hover{filter:brightness(1.05);}
  .start:active{transform:translateY(1px);}
  .keeper-note{text-align:center;margin:9px 0 2px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .divider{position:relative;height:1px;background:linear-gradient(90deg,transparent,var(--line) 20%,var(--line) 80%,transparent);margin:20px 0 10px;}
  .divider::after{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;border-radius:50%;background:var(--amber);transform:translate(-50%,-50%);box-shadow:0 0 0 4px var(--ink);}

  .sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:30px 0 12px;}
  .sec-head h2{font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .link{background:none;border:none;color:var(--amber);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;padding:6px;}

  .team-card{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--ink-2);border:1px solid var(--line);border-radius:13px;
    padding:15px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;
  }
  .team-card:hover{border-color:var(--amber);}
  .team-card .nm{font-family:'Archivo',sans-serif;font-weight:800;font-size:17px;}
  .team-card .ct{font-size:12px;color:var(--muted);margin-top:2px;}
  .chev{color:var(--muted);font-size:18px;}
  .card-del{background:none;border:none;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:6px 8px;border-radius:8px;flex:0 0 auto;transition:color .15s,background .15s;}
  .card-del:hover{color:var(--flame);background:rgba(242,96,47,.1);}

  .empty{text-align:center;padding:36px 18px;color:var(--muted);border:1px dashed var(--line);border-radius:14px;}
  .empty b{display:block;color:var(--text);font-family:'Archivo';font-weight:800;font-size:17px;margin-bottom:5px;}

  /* compact team pills */
  .chip-scroll{overflow-x:auto;margin:0 -14px;padding:2px 14px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .chip-scroll::-webkit-scrollbar{display:none;}
  .chip-row{display:flex;gap:7px;width:max-content;}
  .team-chip{display:inline-flex;align-items:center;gap:7px;background:var(--ink-2);border:1px solid var(--line);border-radius:999px;padding:8px 9px 8px 13px;cursor:pointer;font-family:inherit;color:var(--text);white-space:nowrap;transition:border-color .15s,transform .08s;}
  .team-chip:hover{border-color:var(--amber);}
  .team-chip:active{transform:scale(.96);}
  .team-chip b{font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;}
  .team-chip i{font-style:normal;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);background:var(--surface);border-radius:999px;padding:2px 6px;}
  .team-chip.add{color:var(--amber);font-weight:800;border-style:dashed;padding:10px 16px;font-family:'Archivo';font-size:14px;}

  /* team view averages */
  .avg-note{color:var(--muted);font-size:12px;letter-spacing:.04em;margin:-2px 0 16px;}
  .player-avg{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:14px 14px 13px;margin-bottom:11px;}
  .pa-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px;}
  .pa-name{font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;}
  .pa-gp{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
  .pa-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
  .pa-cell{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 3px 7px;text-align:center;}
  .pa-cell.to{border-color:#3a2a3c;}
  .pa-v{font-family:'Space Mono',monospace;font-size:18px;line-height:1;color:var(--amber);}
  .pa-cell.to .pa-v{color:var(--flame);}
  .pa-k{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:4px;font-weight:700;}

  /* ---------- GENERIC SCREEN ---------- */
  .topbar{display:flex;align-items:center;gap:12px;padding:20px 0 18px;}
  .back{background:var(--surface);border:1px solid var(--line);color:var(--text);width:42px;height:42px;border-radius:11px;font-size:20px;cursor:pointer;flex:0 0 auto;}
  .back:active{transform:translateY(1px);}
  .screen-title{font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;}

  /* ---------- ROSTER EDIT ---------- */
  label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:700;}
  input{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:13px 14px;font-size:16px;font-family:inherit;}
  input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(233,162,59,.16);}
  .field{margin-bottom:18px;}
  .add-row{display:flex;gap:10px;margin-bottom:12px;}
  .add-row input{flex:1;}
  .mini-btn{background:var(--surface-2);border:1px solid var(--line);color:var(--amber);font-weight:800;font-size:22px;border-radius:11px;width:52px;cursor:pointer;flex:0 0 auto;}
  .mini-btn:active{transform:translateY(1px);}
  .plist{list-style:none;margin:4px 0 24px;}
  .plist li{display:flex;align-items:center;justify-content:space-between;background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;font-weight:600;}
  .plist li button{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;}
  .plist li button:hover{color:var(--flame);}
  .save{width:100%;background:var(--amber);color:#1a1304;border:none;font-family:'Archivo';font-weight:900;font-size:17px;letter-spacing:.04em;text-transform:uppercase;padding:16px;border-radius:13px;cursor:pointer;margin-bottom:10px;}
  .save:active{transform:translateY(1px);}
  .danger{width:100%;background:none;border:1px solid #4a2a30;color:var(--flame);font-weight:700;font-size:14px;padding:13px;border-radius:13px;cursor:pointer;}

  /* ---------- PICK MATCHUP ---------- */
  .vs-wrap{display:flex;flex-direction:column;gap:14px;margin:8px 0 24px;}
  .pick{background:var(--ink-2);border:1px solid var(--line);border-radius:13px;padding:16px;}
  .pick label{margin-bottom:9px;}
  select{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:14px;font-size:16px;font-family:inherit;appearance:none;cursor:pointer;}
  select:focus{outline:none;border-color:var(--amber);}
  .vsbadge{text-align:center;font-family:'Archivo';font-weight:900;color:var(--muted);letter-spacing:.2em;font-size:13px;}

  /* ---------- LIVE GAME ---------- */
  .scoreboard{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;
    background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:16px 14px;margin-bottom:8px;
  }
  .sb-team{text-align:center;}
  .sb-team .nm{font-family:'Archivo';font-weight:800;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sb-team .sc{font-family:'Space Mono',monospace;font-size:46px;line-height:1;margin-top:4px;}
  .sb-team.a .sc{color:var(--amber);}
  .sb-team.b .sc{color:var(--teal);}
  .sb-mid{font-family:'Archivo';font-weight:900;color:var(--muted);font-size:13px;}
  .game-tools{display:flex;gap:10px;margin-bottom:20px;}
  .tool{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--text);font-family:inherit;font-weight:700;font-size:14px;padding:13px;border-radius:11px;cursor:pointer;}
  .tool:active{transform:translateY(1px);}
  .tool.undo{color:var(--amber);}
  .tool.edit{color:var(--amber);}
  .tool.end{color:var(--flame);border-color:#4a2a30;}

  /* edit (subtract) mode turns the screen red */
  #app.editing .tool.edit{background:var(--flame);border-color:var(--flame);color:#fff;box-shadow:0 0 0 3px rgba(242,96,47,.18);}
  #app.editing .scoreboard{border-color:var(--flame);}
  #app.editing .player{border-color:rgba(242,96,47,.55);}
  #app.editing .stat{border-color:var(--flame);background:rgba(242,96,47,.08);}
  #app.editing .stat .v{color:var(--flame);}
  #app.editing .stat .k{color:#f08a66;}
  #app.editing .hint{color:var(--flame);font-weight:700;}

  .team-block{margin-bottom:22px;}
  .team-block .label-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .dot{width:11px;height:11px;border-radius:50%;}
  .dot.a{background:var(--amber);} .dot.b{background:var(--teal);}
  .team-block h3{font-family:'Archivo';font-weight:800;font-size:16px;}

  .player{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:13px 13px 11px;margin-bottom:11px;}
  .player .pname{font-weight:700;font-size:15px;margin-bottom:10px;display:flex;justify-content:space-between;}
  .player .pname .ppts{font-family:'Space Mono',monospace;color:var(--amber);}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;}
  .stat{
    background:var(--surface);border:1px solid var(--line);border-radius:11px;
    padding:10px 4px 8px;text-align:center;cursor:pointer;user-select:none;
    transition:transform .06s, background .1s, border-color .1s;
  }
  .stat:active{transform:scale(.93);background:var(--surface-2);}
  .stat.pop{animation:pop .25s ease;}
  @keyframes pop{0%{border-color:var(--amber);}100%{border-color:var(--line);}}
  .stat .k{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .stat .v{font-family:'Space Mono',monospace;font-size:24px;line-height:1;margin-top:3px;}
  .stat.tov .v{color:var(--flame);}
  .hint{text-align:center;color:var(--muted);font-size:12px;margin:2px 0 22px;}

  .hidden{display:none;}

  /* ---------- MODAL + TOAST ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(6,10,20,.72);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:50;
  }
  .overlay.show{display:flex;animation:fade .15s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .dialog{
    background:var(--ink-2);border:1px solid var(--line);border-radius:16px;
    padding:24px 22px 20px;max-width:360px;width:100%;
    box-shadow:0 24px 70px rgba(0,0,0,.55);animation:rise .18s ease;
  }
  @keyframes rise{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .dialog-title{font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;margin-bottom:8px;}
  .dialog-msg{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:20px;}
  .dialog-btns{display:flex;gap:10px;}
  .dlg-cancel,.dlg-ok{flex:1;border:none;font-family:inherit;font-weight:700;font-size:15px;padding:14px;border-radius:11px;cursor:pointer;}
  .dlg-cancel{background:var(--surface-2);border:1px solid var(--line);color:var(--text);}
  .dlg-cancel:active{transform:translateY(1px);}
  .dlg-ok{background:var(--flame);color:#fff;}
  .dlg-ok:active{transform:translateY(1px);}
  .toast{
    position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);
    background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:60;box-shadow:0 12px 36px rgba(0,0,0,.45);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- RESULTS ---------- */
  .leaders{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  @media(max-width:480px){.leaders{grid-template-columns:repeat(2,1fr);}}
  .tile{background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:13px 12px;}
  .tile.to{border-color:#3a2a3c;}
  .tile .cat{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .tile .val{font-family:'Space Mono',monospace;font-size:30px;line-height:1;margin:7px 0 5px;color:var(--amber);}
  .tile.to .val{color:var(--flame);}
  .tile .who{font-size:12px;font-weight:600;overflow-wrap:anywhere;}
  .tile .who.none{color:var(--muted);font-weight:400;}
  .leaders.wk .tile{padding:10px 10px;}
  .leaders.wk .val{font-size:23px;margin:6px 0 4px;}

  /* week blocks on home */
  .week-block{
    background:var(--ink-2);border:1px solid var(--line);border-radius:16px;
    padding:16px 15px 17px;margin-bottom:16px;
  }
  .week-top{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:13px;margin-bottom:14px;border-bottom:1px solid var(--line);
  }
  .week-name{font-family:'Archivo',sans-serif;font-weight:900;font-size:21px;letter-spacing:-.01em;}
  .week-name::before{content:"";display:inline-block;width:7px;height:18px;background:var(--amber);border-radius:2px;margin-right:9px;vertical-align:-2px;}
  .week-games{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:5px 10px;border-radius:20px;}
  .sub-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px;}
  .week-cards .team-card{background:var(--surface);}

  .box-team{margin-bottom:18px;}
  .box-label{font-family:'Archivo';font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .box-label .dot{width:10px;height:10px;border-radius:50%;}
  .box-label .dot.a{background:var(--amber);} .box-label .dot.b{background:var(--teal);}
  .lines{border:1px solid var(--line);border-radius:11px;overflow:hidden;}
  .lines-head,.line{display:grid;grid-template-columns:1.5fr repeat(6,1fr);align-items:center;gap:4px;}
  .lines-head{background:var(--surface-2);padding:9px 12px;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .lines-head span,.line .s{text-align:center;}
  .lines-head .nm,.line .nm{text-align:left;}
  .line{padding:10px 12px;border-top:1px solid var(--line);font-size:14px;}
  .line .nm{font-weight:600;overflow-wrap:anywhere;}
  .line .s{font-family:'Space Mono',monospace;}
  @media(max-width:560px){
    .lines-head{display:none;}
    .line{grid-template-columns:1fr;gap:6px;padding:12px;}
    .line .nm{font-size:15px;}
    .line .s{display:inline-flex;gap:5px;text-align:left;font-size:12px;color:var(--muted);margin-right:6px;}
    .line .s::before{content:attr(data-l);text-transform:uppercase;font-family:'Inter';font-size:9px;letter-spacing:.06em;}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<div class="overlay" id="modal">
  <div class="dialog">
    <div class="dialog-title" id="modal-title">Are you sure?</div>
    <div class="dialog-msg" id="modal-msg"></div>
    <div class="dialog-btns">
      <button class="dlg-cancel" id="modal-cancel">Cancel</button>
      <button class="dlg-ok" id="modal-ok">Delete</button>
    </div>
  </div>
</div>
<div class="overlay" id="pwd">
  <div class="dialog">
    <div class="dialog-title">Enter password</div>
    <div class="dialog-msg">Required to start a game.</div>
    <input id="pwd-input" type="password" placeholder="Password" autocomplete="off" style="margin-bottom:16px;">
    <div class="dialog-btns">
      <button class="dlg-cancel" id="pwd-cancel">Cancel</button>
      <button class="dlg-ok" id="pwd-ok" style="background:var(--amber);color:#1a1304;">Unlock</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const STATS=[['pts','Pts'],['reb','Reb'],['ast','Ast'],['stl','Stl'],['blk','Blk'],['tov','TO']];
const T_KEY='teams', G_KEY='game', F_KEY='finished';
let teams=[], game=null, draft=null, finished=[], result=null, teamViewId=null;
let pwFails=0, lockUntil=0, editMode=false;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function confirmAsk(msg,{title='Are you sure?',ok='Delete'}={}){
  return new Promise(res=>{
    const ov=document.getElementById('modal');
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-msg').textContent=msg;
    const okb=document.getElementById('modal-ok'), cb=document.getElementById('modal-cancel');
    okb.textContent=ok;
    ov.classList.add('show');
    const finish=v=>{ov.classList.remove('show');okb.onclick=null;cb.onclick=null;ov.onclick=null;res(v);};
    okb.onclick=()=>finish(true);
    cb.onclick=()=>finish(false);
    ov.onclick=e=>{if(e.target===ov)finish(false);};
  });
}
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
const GAME_PASSWORD='FatNeck11';
function askPassword(){
  return new Promise(res=>{
    const ov=document.getElementById('pwd');
    const inp=document.getElementById('pwd-input');
    const ok=document.getElementById('pwd-ok'), cb=document.getElementById('pwd-cancel');
    inp.value=''; inp.placeholder='Password'; inp.style.borderColor='';
    ov.classList.add('show');
    setTimeout(()=>inp.focus(),60);
    const close=v=>{ov.classList.remove('show');ok.onclick=null;cb.onclick=null;ov.onclick=null;inp.onkeydown=null;res(v);};
    const submit=()=>{
      if(inp.value===GAME_PASSWORD){pwFails=0;close(true);}
      else{
        pwFails++;
        if(pwFails>=3){
          lockUntil=Date.now()+60000; pwFails=0; persistLock();
          close(false);
          toast('Too many tries. Locked for 1 minute.');
        }else{
          inp.value='';inp.placeholder='Wrong password';inp.style.borderColor='var(--flame)';
          toast('Wrong password · '+(3-pwFails)+' left');
        }
      }
    };
    ok.onclick=submit;
    inp.onkeydown=e=>{if(e.key==='Enter')submit();};
    cb.onclick=()=>close(false);
    ov.onclick=e=>{if(e.target===ov)close(false);};
  });
}

const store = (typeof window!=='undefined' && window.storage) ? window.storage : {
  get:async(k)=>{try{const v=localStorage.getItem(k);return v!==null?{key:k,value:v}:null;}catch(e){return null;}},
  set:async(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}return {key:k,value:v};},
  delete:async(k)=>{try{localStorage.removeItem(k);}catch(e){}return {key:k,deleted:true};},
  list:async()=>({keys:[]})
};

async function loadAll(){
  try{const r=await store.get(T_KEY); teams=r&&r.value?JSON.parse(r.value):[];}catch(e){teams=[];}
  try{const r=await store.get(G_KEY); game=r&&r.value?JSON.parse(r.value):null;}catch(e){game=null;}
  try{const r=await store.get(F_KEY); finished=r&&r.value?JSON.parse(r.value):[];}catch(e){finished=[];}
  try{const r=await store.get('pwlock'); lockUntil=r&&r.value?parseInt(r.value,10)||0:0;}catch(e){lockUntil=0;}
}
async function persistLock(){try{await store.set('pwlock',String(lockUntil));}catch(e){}}
async function saveTeams(){try{await store.set(T_KEY,JSON.stringify(teams));}catch(e){}}
async function saveFinished(){try{await store.set(F_KEY,JSON.stringify(finished));}catch(e){}}
async function saveGame(){try{if(game)await store.set(G_KEY,JSON.stringify(game));else await store.delete(G_KEY);}catch(e){}}

    const now=Date.now();
    if(now<lockUntil){ toast('Locked. Try again in '+Math.ceil((lockUntil-now)/1000)+'s'); return; }
    if(!(await askPassword()))return;
    draft={id:uid(),name:'',players:[]}; go('roster');
  });
  if(resume) document.getElementById('resume').onclick=()=>go('game');
  app.querySelectorAll('[data-team]').forEach(el=>el.onclick=()=>{
    teamViewId=el.dataset.team; go('team');
  });
  app.querySelectorAll('[data-result]').forEach(el=>el.onclick=()=>{
    result=finished.find(g=>g.id===el.dataset.result);
    go('results');
  });
  app.querySelectorAll('[data-delgame]').forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    if(!(await confirmAsk('Once deleted you cannot get this game back.')))return;
    finished=finished.filter(g=>g.id!==b.dataset.delgame);
    await saveFinished(); renderHome();
  });
}

/* ---------- TEAM VIEW (read-only roster + averages) ---------- */
function playerAverages(pid){
  let gp=0; const tot={pts:0,reb:0,ast:0,stl:0,blk:0,tov:0};
  finished.forEach(g=>{
    if(g.stats && g.stats[pid]!==undefined){ gp++; STATS.forEach(([k])=>tot[k]+=g.stats[pid][k]); }
  });
  const avg={}; STATS.forEach(([k])=>avg[k]= gp ? tot[k]/gp : 0);
  return {gp, avg};
}
function renderTeam(){
  const t=teams.find(x=>x.id===teamViewId);
  if(!t){go('home');return;}
  const rows = t.players.length
    ? t.players.map(p=>{
        const {gp,avg}=playerAverages(p.id);
        return `<div class="player-avg">
          <div class="pa-top"><span class="pa-name">${esc(p.name)}</span><span class="pa-gp tabnum">${gp} GP</span></div>
          <div class="pa-stats">${STATS.map(([k,lab])=>`<div class="pa-cell ${k==='tov'?'to':''}"><div class="pa-v tabnum">${avg[k].toFixed(1)}</div><div class="pa-k">${lab}</div></div>`).join('')}</div>
        </div>`;
      }).join('')
    : `<div class="empty"><b>No players</b>Tap Edit to add players to this team.</div>`;
  app.innerHTML=`
    <div class="topbar"><button class="back" id="back">‹</button><div class="screen-title">${esc(t.name)}</div><button class="link" id="edit" style="margin-left:auto;">Edit</button></div>
    <p class="avg-note">Per-game averages · ${t.players.length} player${t.players.length!==1?'s':''}</p>
    ${rows}`;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('edit').onclick=async()=>{
    const now=Date.now();
    if(now<lockUntil){ toast('Locked. Try again in '+Math.ceil((lockUntil-now)/1000)+'s'); return; }
    if(!(await askPassword()))return;
    draft=JSON.parse(JSON.stringify(t)); go('roster');
  };
}

/* ---------- ROSTER EDITOR ---------- */
function renderRoster(){
  const exists=teams.some(t=>t.id===draft.id);
  app.innerHTML=`
    <div class="topbar"><button class="back" id="back">‹</button><div class="screen-title">${exists?'Edit team':'New team'}</div></div>
    <div class="field"><label>Team name</label><input id="tname" type="text" placeholder="e.g. Sam" value="${esc(draft.name)}" autocomplete="off"></div>
    <label>Players</label>
    <div class="add-row"><input id="pname" type="text" placeholder="Add a player" autocomplete="off"><button class="mini-btn" id="addp">+</button></div>
    <ul class="plist" id="plist"></ul>
    <button class="save" id="save">Save team</button>
    ${exists?'<button class="danger" id="del">Delete team</button>':''}`;

  const drawList=()=>{
    document.getElementById('plist').innerHTML = draft.players.length
      ? draft.players.map(p=>`<li>${esc(p.name)}<button data-rm="${p.id}">×</button></li>`).join('')
      : `<li style="border-style:dashed;color:var(--muted);justify-content:center;">No players yet</li>`;
    document.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{draft.players=draft.players.filter(p=>p.id!==b.dataset.rm);drawList();});
  };
  drawList();

  const nameInput=document.getElementById('tname');
  nameInput.oninput=()=>draft.name=nameInput.value;
  const pInput=document.getElementById('pname');
  const addP=()=>{const n=pInput.value.trim();if(!n)return;draft.players.push({id:uid(),name:n});pInput.value='';pInput.focus();drawList();};
  document.getElementById('addp').onclick=addP;
  pInput.onkeydown=e=>{if(e.key==='Enter')addP();};

  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('save').onclick=async()=>{
    draft.name=draft.name.trim();
    if(!draft.name){toast('Give the team a name');return;}
    if(draft.players.length===0){toast('Add at least one player');return;}
    const i=teams.findIndex(t=>t.id===draft.id);
    if(i>=0)teams[i]=draft; else teams.push(draft);
    await saveTeams(); go('home');
  };
  if(exists)document.getElementById('del').onclick=async()=>{
    if(!(await confirmAsk('Deleting removes this team and its roster.',{title:'Delete team?'})))return;
    teams=teams.filter(t=>t.id!==draft.id); await saveTeams(); go('home');
  };
}

/* ---------- PICK MATCHUP ---------- */
function renderPick(){
  const opts=sel=>teams.map(t=>`<option value="${t.id}" ${t.id===sel?'selected':''}>${esc(t.name)}</option>`).join('');
  const a=teams[0].id, b=teams[1].id;
  const defW=finished.length?(finished[0].week||1):1;
  const weekOpts=Array.from({length:8},(_,i)=>i+1).map(w=>`<option value="${w}" ${w===defW?'selected':''}>Week ${w}</option>`).join('');
  app.innerHTML=`
    <div class="topbar"><button class="back" id="back">‹</button><div class="screen-title">Start Game</div></div>
    <div class="pick" style="margin-bottom:14px;"><label>Week</label><select id="selW">${weekOpts}</select></div>
    <div class="vs-wrap">
      <div class="pick"><label>Home</label><select id="selA">${opts(a)}</select></div>
      <div class="vsbadge vsbadge" style="text-align:center;font-family:'Archivo';font-weight:900;color:var(--muted);letter-spacing:.2em;">VS</div>
      <div class="pick"><label>Away</label><select id="selB">${opts(b)}</select></div>
    </div>
    <button class="save" id="tip">Tip Off</button>`;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('tip').onclick=()=>{
    const ida=document.getElementById('selA').value, idb=document.getElementById('selB').value;
    const week=parseInt(document.getElementById('selW').value,10)||1;
    if(ida===idb){toast('Pick two different teams');return;}
    startGame(ida,idb,week);
  };
}

function startGame(ida,idb,week){
  const A=teams.find(t=>t.id===ida), B=teams.find(t=>t.id===idb);
  const stats={};
  [...A.players,...B.players].forEach(p=>stats[p.id]={pts:0,reb:0,ast:0,stl:0,blk:0,tov:0});
  game={
    week,
    teamA:{id:A.id,name:A.name,players:A.players.map(p=>({id:p.id,name:p.name}))},
    teamB:{id:B.id,name:B.name,players:B.players.map(p=>({id:p.id,name:p.name}))},
    stats, history:[]
  };
  saveGame(); go('game');
}

/* ---------- LIVE GAME ---------- */
function teamScore(team){return team.players.reduce((s,p)=>s+game.stats[p.id].pts,0);}

function playerCard(p){
  const tiles=STATS.map(([k,lab])=>`
    <div class="stat ${k==='tov'?'tov':''}" data-p="${p.id}" data-k="${k}">
      <div class="k">${lab}</div>
      <div class="v tabnum" id="c_${p.id}_${k}">${game.stats[p.id][k]}</div>
    </div>`).join('');
  return `<div class="player">
    <div class="pname"><span>${esc(p.name)}</span><span class="ppts tabnum" id="pp_${p.id}">${game.stats[p.id].pts} pts</span></div>
    <div class="stats">${tiles}</div></div>`;
}

function renderGame(){
  const A=game.teamA,B=game.teamB;
  app.innerHTML=`
    <div class="topbar"><button class="back" id="back">‹</button><div class="screen-title">Live</div></div>
    <div class="scoreboard">
      <div class="sb-team a"><div class="nm">${esc(A.name)}</div><div class="sc tabnum" id="score_A">${teamScore(A)}</div></div>
      <div class="sb-mid">VS</div>
      <div class="sb-team b"><div class="nm">${esc(B.name)}</div><div class="sc tabnum" id="score_B">${teamScore(B)}</div></div>
    </div>
    <div class="game-tools">
      <button class="tool edit" id="edit"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Edit</button>
      <button class="tool end" id="end">End game</button>
    </div>
    <div class="team-block">
      <div class="label-row"><span class="dot a"></span><h3>${esc(A.name)}</h3></div>
      ${A.players.map(playerCard).join('')}
    </div>
    <div class="team-block">
      <div class="label-row"><span class="dot b"></span><h3>${esc(B.name)}</h3></div>
      ${B.players.map(playerCard).join('')}
    </div>
    <p class="hint" id="ghint">One tap adds 1. Tap Edit to fix a mistake.</p>`;

  editMode=false; app.classList.remove('editing');
  app.querySelectorAll('.stat').forEach(el=>el.addEventListener('click',()=>onTap(el.dataset.p,el.dataset.k,el)));
  const editBtn=document.getElementById('edit');
  editBtn.onclick=()=>{
    editMode=!editMode;
    app.classList.toggle('editing',editMode);
    editBtn.innerHTML=editMode
      ? '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M20 6 9 17l-5-5"/></svg>Done'
      : '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Edit';
    document.getElementById('ghint').textContent = editMode
      ? 'Edit mode · tap a stat to subtract 1'
      : 'One tap adds 1. Tap Edit to fix a mistake.';
  };
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('end').onclick=async()=>{
    const snap=JSON.parse(JSON.stringify(game));
    snap.id=uid(); snap.date=new Date().toISOString();
    finished.unshift(snap);
    if(finished.length>30)finished=finished.slice(0,30);
    await saveFinished();
    game=null; await saveGame();
    result=snap; go('results');
  };
}

function teamOf(pid){return game.teamA.players.some(p=>p.id===pid)?'A':'B';}
function refreshScore(side){const t=side==='A'?game.teamA:game.teamB;document.getElementById('score_'+side).textContent=teamScore(t);}

function onTap(pid,k,el){
  if(editMode){
    if(game.stats[pid][k]>0) game.stats[pid][k]--;
  } else {
    game.stats[pid][k]++;
  }
  document.getElementById(`c_${pid}_${k}`).textContent=game.stats[pid][k];
  if(k==='pts'){
    document.getElementById('pp_'+pid).textContent=game.stats[pid].pts+' pts';
    refreshScore(teamOf(pid));
  }
  if(el){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}
  saveGame();
}

/* ---------- RESULTS / BOX SCORE ---------- */
function allPlayers(g){
  return [...g.teamA.players.map(p=>({...p,team:'A'})),...g.teamB.players.map(p=>({...p,team:'B'}))];
}
function weekLeaders(games){
  const tot={};
  games.forEach(g=>allPlayers(g).forEach(p=>{
    const s=g.stats[p.id];
    if(!tot[p.id])tot[p.id]={name:p.name,pts:0,reb:0,ast:0,stl:0,blk:0,tov:0};
    STATS.forEach(([k])=>tot[p.id][k]+=s[k]);
  }));
  const ps=Object.values(tot), out={};
  STATS.forEach(([k])=>{
    let max=-1,who=[];
    ps.forEach(p=>{if(p[k]>max){max=p[k];who=[p.name];}else if(p[k]===max&&p[k]>0)who.push(p.name);});
    out[k]={max,who:[...new Set(who)]};
  });
  return out;
}
function gameCardHTML(g){
  const sA=scoreOf(g,'teamA'),sB=scoreOf(g,'teamB');
  const d=new Date(g.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `<div class="team-card" data-result="${g.id}">
    <div><div class="nm" style="font-size:15px;">${esc(g.teamA.name)} <span class="tabnum" style="color:var(--amber);">${sA}</span> — <span class="tabnum" style="color:var(--teal);">${sB}</span> ${esc(g.teamB.name)}</div><div class="ct">${d}</div></div>
    <button class="card-del" data-delgame="${g.id}" title="Delete">×</button></div>`;
}
function weekStrip(games){
  const L=weekLeaders(games);
  return `<div class="leaders wk">`+STATS.map(([k,lab])=>{
    const x=L[k];const has=x.max>0&&x.who.length;
    return `<div class="tile ${k==='tov'?'to':''}"><div class="cat">${k==='tov'?'Most TO':lab}</div><div class="val tabnum">${has?x.max:'–'}</div><div class="who ${has?'':'none'}">${has?x.who.join(', '):'—'}</div></div>`;
  }).join('')+`</div>`;
}
function renderWeekGroups(){
  const byWeek={};
  finished.forEach(g=>{const w=g.week||0;(byWeek[w]||=[]).push(g);});
  const weeks=Object.keys(byWeek).map(Number).sort((a,b)=>b-a);
  return `<div class="sec-head"><h2>Saved by Week</h2></div>`+weeks.map(w=>{
    const games=byWeek[w];
    const title=w?('Week '+w):'No week set';
    return `<div class="week-block">
      <div class="week-top">
        <div class="week-name">${title}</div>
        <span class="week-games">${games.length} game${games.length!==1?'s':''}</span>
      </div>
      <div class="sub-label">${title} stat leaders</div>
      ${weekStrip(games)}
      <div class="sub-label" style="margin-top:16px;">Games</div>
      <div class="week-cards">${games.map(gameCardHTML).join('')}</div>
    </div>`;
  }).join('');
}


function gameLeaders(g){
  const out={};
  STATS.forEach(([k])=>{
    let max=-1,who=[];
    allPlayers(g).forEach(p=>{const v=g.stats[p.id][k];
      if(v>max){max=v;who=[p.name];}else if(v===max&&v>0){who.push(p.name);}});
    out[k]={max,who:[...new Set(who)]};
  });
  return out;
}
function scoreOf(g,team){return g[team].players.reduce((s,p)=>s+g.stats[p.id].pts,0);}

function boxTable(g,team){
  const t=g[team];
  const rows=t.players.map(p=>{
    const s=g.stats[p.id];
    return `<div class="line">
      <span class="nm">${esc(p.name)}</span>
      ${STATS.map(([k])=>`<span class="s tabnum" data-l="${k}">${s[k]}</span>`).join('')}
    </div>`;
  }).join('');
  return `<div class="box-team">
    <div class="box-label"><span class="dot ${team==='teamA'?'a':'b'}"></span>${esc(t.name)} · <span class="tabnum">${scoreOf(g,team)}</span></div>
    <div class="lines">
      <div class="lines-head"><span class="nm">Player</span>${STATS.map(([,l])=>`<span>${l}</span>`).join('')}</div>
      ${rows}
    </div></div>`;
}

function renderResults(){
  const g=result; if(!g){go('home');return;}
  const lead=gameLeaders(g);
  const sA=scoreOf(g,'teamA'), sB=scoreOf(g,'teamB');
  const winA=sA>sB, tie=sA===sB;

  const tiles=STATS.map(([k,lab])=>{
    const L=lead[k]; const has=L.max>0&&L.who.length;
    return `<div class="tile ${k==='tov'?'to':''}">
      <div class="cat">${k==='tov'?'Most TO':lab}</div>
      <div class="val tabnum">${has?L.max:'–'}</div>
      <div class="who ${has?'':'none'}">${has?L.who.join(', '):'—'}</div>
    </div>`;
  }).join('');

  app.innerHTML=`
    <div class="topbar"><button class="back" id="back">‹</button><div class="screen-title">${g.week?('Week '+g.week+' · Final'):'Final'}</div></div>
    <div class="scoreboard">
      <div class="sb-team a"><div class="nm">${esc(g.teamA.name)}${!tie&&winA?' ▲':''}</div><div class="sc tabnum">${sA}</div></div>
      <div class="sb-mid">${tie?'TIE':'FINAL'}</div>
      <div class="sb-team b"><div class="nm">${esc(g.teamB.name)}${!tie&&!winA?' ▲':''}</div><div class="sc tabnum">${sB}</div></div>
    </div>
    <div class="sec-head" style="margin:24px 0 12px;"><h2>Category Leaders</h2></div>
    <div class="leaders">${tiles}</div>
    <div class="sec-head" style="margin:26px 0 12px;"><h2>Box Score</h2></div>
    ${boxTable(g,'teamA')}
    ${boxTable(g,'teamB')}
    <button class="save" id="done" style="margin-top:22px;">Done</button>
    <button class="danger" id="delresult" style="margin-top:10px;">Delete this game</button>`;

  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('done').onclick=()=>go('home');
  document.getElementById('delresult').onclick=async()=>{
    if(!(await confirmAsk('Once deleted you cannot get this game back.')))return;
    finished=finished.filter(x=>x.id!==g.id);
    await saveFinished(); result=null; go('home');
  };
}


function render(){
  if(view==='home')renderHome();
  else if(view==='team')renderTeam();
  else if(view==='roster')renderRoster();
  else if(view==='pick')renderPick();
  else if(view==='results')renderResults();
  else if(view==='game'){ if(!game){view='home';renderHome();}else renderGame(); }
}

(async()=>{ await loadAll(); render(); })();
</script>
</body>
</html>
